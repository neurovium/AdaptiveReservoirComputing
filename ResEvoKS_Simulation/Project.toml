# =============================================================================
# ResEvoKS_Simulation.jl
# Evolutionary Reservoir Computing for Kuramoto-Sivashinsky spatiotemporal chaos
# -----------------------------------------------------------------------------
# This is the Julia port of the MATLAB `64D-KS-Sim` simulation suite. It
# generates KS trajectories (ETDRK4), builds echo-state reservoirs, trains a
# ridge readout, runs autonomous closed-loop prediction, and evolves reservoir
# construction hyperparameters with a (parallel) genetic algorithm.
#
# See REPORT_original_code.md for the mapping from each MATLAB file to its Julia
# counterpart, and the wiki under docs/ for the mathematics and usage.
# =============================================================================

