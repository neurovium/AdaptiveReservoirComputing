# =============================================================================
# ResEvoKS_Analysis.jl
# Phase-2 analysis suite for the evolutionary reservoir-computing project.
# -----------------------------------------------------------------------------
# Reads the per-individual artifacts written by the ResEvoKS_Simulation simulation and
# reproduces the paper's structural analyses: the size-efficiency Pareto front,
# the random-walk Laplacian spectrum (PCA, smoothed density, optimal-transport
# distance), community modularity and connection cost, and the NSGA-II
# multi-objective trade-off. See REPORT_analysis_code.md and docs/.
#
# This package is standalone: it reads .mat/.jld2 files directly and does NOT
# depend on the simulation package. Plotting lives in scripts/, not in src/.
# =============================================================================

